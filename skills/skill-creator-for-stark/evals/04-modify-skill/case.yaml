id: 04-modify-skill
type: integration

cases:
  - id: 04-modify-skill
    input: input.json

    run:
      command: {python} scripts/run_pipeline.py --input {input} --output {output}
      timeout_sec: 120

    assertions:
      - id: actual-json-valid
        title: actual output JSON parse 검증
        type: command
        cmd: {python} -m json.tool {output}
      - id: modify-required-actions
        title: 기존 스킬 수정 필수 보존/변경 action 검증
        type: command
        cmd: |
          {python} -c "import json,sys,pathlib; o=json.load(open(sys.argv[1])); assert o['schema_version']==1; assert o['status']=='success'; assert o['mode']=='modify'; assert o['skill_dir'].endswith('/for-test-youtube-content') or o['skill_dir']=='ai_tool/skills/for-test-youtube-content'; files=o['files_written']; paths=[f['path'] for f in files]; assert any(p.endswith('/SKILL.md') for p in paths); assert any('feedback-log.template.md' in p for p in paths); assert any(p.endswith('/evals/for-test-youtube-content.eval.yaml') for p in paths); skill=pathlib.Path(o['skill_dir'])/'SKILL.md'; assert 'feedback/' in skill.read_text(encoding='utf-8')" {output}
