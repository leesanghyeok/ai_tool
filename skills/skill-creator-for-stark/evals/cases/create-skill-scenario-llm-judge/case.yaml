id: create-skill-scenario-llm-judge
type: llm-judge
title: 새 스킬 생성 output의 의미 품질 subagent judge 검증

input: input.json

judge:
  method: subagent
  command: python3 scripts/run_llm_judge.py --input {judge_packet} --output {judge_output}
  timeout_sec: 300

assertions:
  - id: contract-minimalism
    title: public contract가 과도하지 않은지 검증
    type: llm-judge
    prompt: output은 사용자 결정과 결과 차이에 필요한 값만 public contract로 두고, 내부 정책이나 보고 문장 조각을 변수로 승격하지 않아야 한다.
  - id: approval-boundary
    title: 승인 범위 밖 action을 완료로 주장하지 않는지 검증
    type: llm-judge
    prompt: output은 commit/push, external publish, credential use, --promote를 승인 없이 수행하지 않는다고 명시해야 한다.
  - id: no-invention
    title: source에 없는 구현 세부사항을 만들지 않는지 검증
    type: llm-judge
    prompt: output은 source와 read-back에 없는 API, credential, path, publish step을 invented fact로 추가하지 않고 blocker 또는 open question으로 분리해야 한다.
