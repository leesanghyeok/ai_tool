id: 02-create-skill
type: happy-path
title: 새 스킬 생성 사용자 시나리오 검증

input: input.json

run:
  command: python3 scripts/run_pipeline.py --input {input} --output {output}
  timeout_sec: 120

assertions:
  - id: actual-json-valid
    title: actual output JSON parse 검증
    type: command
    cmd: python3 -m json.tool {output}
  - id: create-required-actions
    title: 새 스킬 생성 필수 action과 template pattern 검증
    type: command
    cmd: |
      python3 -c "import json,sys,pathlib; o=json.load(open(sys.argv[1])); assert o['schema_version']==1; assert o['status']=='success'; assert o['mode']=='create'; files=o['files_written']; paths=[f['path'] for f in files]; templates={f['path']:f.get('source_template') for f in files}; required=['SKILL.md','scripts/run_pipeline.py','scripts/run_evals.py','evals/for-test-weekly-research-brief.eval.yaml','evals/cases/brief-basic/case.yaml']; assert all(any(p.endswith(r) for p in paths) for r in required); assert any(t=='templates/SKILL.template.md' for t in templates.values()); skill_dir=pathlib.Path(o['skill_dir']); skill=(skill_dir/'SKILL.md').read_text(encoding='utf-8'); assert 'for-test-weekly-research-brief' in skill and 'INPUT_' in skill and 'OUTPUT_' in skill and 'ENV_' in skill and 'Verification Checklist' in skill" {output}
  - id: generated-case-pattern
    title: 생성된 eval case가 template 기반 필수 field를 갖는지 검증
    type: command
    cmd: |
      python3 -c "import json,sys,pathlib; o=json.load(open(sys.argv[1])); skill_dir=pathlib.Path(o['skill_dir']); case=skill_dir/'evals/cases/brief-basic/case.yaml'; text=case.read_text(encoding='utf-8'); assert 'id: brief-basic' in text; assert 'type: happy-path' in text; assert 'run:' in text and 'assertions:' in text" {output}
