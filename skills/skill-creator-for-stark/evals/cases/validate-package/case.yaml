id: validate-package
type: regression
title: 스킬 패키지 구조 validator 통과 여부 검증

run:
  command: python3 scripts/validate-skill-package.py . > {output}
  timeout_sec: 120

assertions:
  - id: package-validator-pass
    title: validate-skill-package.py가 PASS를 출력하는지 검증
    type: command
    cmd: grep -q '^PASS:' {output}
