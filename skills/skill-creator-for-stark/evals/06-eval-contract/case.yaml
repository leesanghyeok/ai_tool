id: 06-eval-contract
type: regression

cases:
  - id: 06-eval-contract
    run:
      command: {python} scripts/check_eval_contract_docs.py --output {output}
      timeout_sec: 120

    assertions:
      - id: case-based-contract-docs-present
        title: 문서와 템플릿이 case-based eval 계약 핵심 토큰을 포함하는지 검증
        type: command
        cmd: grep -q '^PASS' {output}
