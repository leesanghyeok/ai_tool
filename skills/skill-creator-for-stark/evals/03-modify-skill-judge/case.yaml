id: 03-modify-skill-judge
type: llm-judge

cases:
  - id: 03-modify-skill-judge
    input: input.json

    judge:
      method: each-session
      command: {python} scripts/run_llm_judge.py assertion --input {assertion_input} --output {judge_output}
      verifyCommand: {python} scripts/verify_llm_judge_state.py --evidence {judge_evidence}
      timeout_sec: 300

    assertions:
      - id: preserves-existing-contract
        title: 기존 eval/support contract 보존 여부 검증
        type: llm-judge
        prompt: output은 기존 eval manifest와 declared case를 삭제하거나 무시하지 않고 보존 또는 명시적 갱신 대상으로 다뤄야 한다.
      - id: minimal-change
        title: 요구사항에 필요한 최소 변경인지 검증
        type: llm-judge
        prompt: output은 사용자 요구인 feedback logging 보강에 필요한 파일만 수정 대상으로 두고 전체 skill rewrite나 unrelated refactor를 계획하지 않아야 한다.
